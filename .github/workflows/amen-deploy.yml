name: Deploy para Amen.pt

on:
  push:
    branches:
      - main  # O envio acontece sempre que fazes push para a branch main

jobs:
  deploy:
    name: Enviar ficheiros para a Amen
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Obter código do repo
      uses: actions/checkout@v4

    - name: 🚀 Sincronizar com FTP da Amen
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.AMEN_FTP_SERVER }}
        username: ${{ secrets.AMEN_FTP_USERNAME }}
        password: ${{ secrets.AMEN_FTP_PASSWORD }}
        # NOTA: Confirma se na Amen a tua pasta é /public_html/ ou /www/
        server-dir: /